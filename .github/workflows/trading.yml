name: XAUUSD Free Trading Signals

on:
  schedule:
    # Every 15 minutes, 6am-9pm UTC, Monday-Friday.
    # 15 min keeps a *private* repo comfortably under the 2,000 free
    # Actions minutes/month. If your repo is public, Actions minutes are
    # unlimited and you can drop this to "*/5" if you want.
    - cron: "*/15 6-21 * * 1-5"

  # Lets you trigger a test run manually from the Actions tab
  workflow_dispatch:

# Needed so the job can commit the updated CSV log / state file back to the repo
permissions:
  contents: write

jobs:
  trading-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_free.txt

      - name: Run trading analysis
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python xauusd_signals_free.py

      - name: Commit updated log and state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals_log.csv last_signal_state.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update signals log [skip ci]"
          git push || true

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading-log-${{ github.run_id }}
          path: trading.log
          retention-days: 7
