name: XAUUSD Backtest (manual only)

# No schedule - this only runs when you click "Run workflow".
# It never interferes with the live trading-signals workflow.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_free.txt

      - name: Run backtest v2
        run: python backtest_v2.py

      - name: Commit trade log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backtest_v2_trades.csv 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Add backtest v2 results [skip ci]"
          git push || true

      - name: Upload trade log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-v2-trades-${{ github.run_id }}
          path: backtest_v2_trades.csv
          retention-days: 30
